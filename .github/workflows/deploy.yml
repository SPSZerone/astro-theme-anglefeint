name: SPS Publish

on:
  workflow_dispatch:
  push:
    branches:
      - publish
  repository_dispatch:
    types:
      - sps_digital_garden_updated

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest

    env:
      THEME: "anglefeint"
      SPS_DG_PATH: "./sps-digital-garden"

    steps:
      - name: Prepare Dynamic Environment Variables
        run: |
          echo "BUILD_PATH=./astro-theme-${{ env.THEME }}" >> $GITHUB_ENV

      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: 'publish'
          path: ${{ env.BUILD_PATH }}

      - name: Checkout sps-digital-garden
        uses: actions/checkout@v4
        with:
          repository: SPSZerone/sps-digital-garden
          ref: 'main'
          path: ${{ env.SPS_DG_PATH }}
          token: ${{ secrets.SPS_DG_PUBLISH_PAT }}

      - name: Setup Nushell
        uses: hustcer/setup-nu@v3
        with:
          nu-version: '0.112.2'

      - name: Setup Golang
        uses: actions/setup-go@v6
        with:
          go-version-file: '${{ env.SPS_DG_PATH }}/go/go.mod'
          # go-version: '1.26.x'
          cache: true

      - name: "SPS Digital Garden -> scripts/publish.nu"
        run: nu ${{ env.SPS_DG_PATH }}/scripts/publish.nu -s astro -t ${{ env.THEME }} -p ${{ env.BUILD_PATH }}


      # 设置 pnpm
      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      # 匹配 astro-theme-anglefeint 对 Node.js 22.12.0+ 的硬性要求
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"
          cache-dependency-path: ${{ env.BUILD_PATH }}/pnpm-lock.yaml

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v5

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        working-directory: ${{ env.BUILD_PATH }}

      - name: Build with Astro
        # Astro 构建产物默认在 dist 目录
        run: |
          pnpm run build \
            --site "${{ steps.pages.outputs.origin }}" \
            --base "${{ steps.pages.outputs.base_path }}"
        working-directory: ${{ env.BUILD_PATH }}

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ${{ env.BUILD_PATH }}/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: build
    runs-on: ubuntu-latest
    name: Deploy
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
